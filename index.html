<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dijkstra Algorithm Simulator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        canvas { cursor: grab; background-image: radial-gradient(#e5e7eb 1px, transparent 1px); background-size: 20px 20px; }
        canvas:active { cursor: grabbing; }
        .panel-shadow { box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06); }
        .is-playing { animation: pulse 1.5s infinite; }
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.6; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans h-screen flex flex-col">

    <header class="bg-indigo-700 text-white p-4 shadow-lg">
        <h1 class="text-2xl font-bold text-center flex items-center justify-center gap-2">
            <span></span> Mô Phỏng Thuật Toán Dijkstra
        </h1>
    </header>

    <div class="flex flex-1 overflow-hidden p-4 gap-4">
        
        <div class="w-1/3 bg-white rounded-xl panel-shadow p-5 flex flex-col gap-4 overflow-y-auto">
            
            <section>
                <div class="flex justify-between items-end mb-2">
                    <h2 class="font-bold text-gray-700 uppercase text-sm tracking-wider">1. Cấu trúc đồ thị</h2>
                    <button onclick="generateRandomGraph()" class="text-xs bg-indigo-50 text-indigo-600 hover:bg-indigo-100 font-bold py-1 px-2 rounded-lg border border-indigo-200 transition">
                        🎲 Sinh Test Ngẫu Nhiên
                    </button>
                </div>
                <textarea id="edge-input" class="w-full h-40 border border-gray-200 rounded-lg p-3 font-mono text-sm focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="A B 5...">
A B 4
A C 2
B C 5
B D 10
C D 3
C E 8
D E 2</textarea>
                <button onclick="parseGraph()" class="mt-2 w-full bg-slate-800 hover:bg-slate-900 text-white font-semibold py-2 rounded-lg transition shadow-sm text-sm">
                    Cập Nhật Đồ Thị
                </button>
            </section>

            <div class="border-t border-gray-100"></div>

            <section>
                <h2 class="font-bold text-gray-700 uppercase text-sm tracking-wider mb-3">2. Thiết lập chạy</h2>
                <div class="grid grid-cols-2 gap-3 mb-4">
                    <div>
                        <label class="block text-xs font-semibold text-gray-500 mb-1">ĐỈNH ĐẦU</label>
                        <input type="text" id="start-node" class="w-full border border-gray-200 rounded-lg p-2 text-center font-bold uppercase focus:ring-2 focus:ring-indigo-500 outline-none" value="A">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-500 mb-1">ĐỈNH CUỐI</label>
                        <input type="text" id="end-node" class="w-full border border-gray-200 rounded-lg p-2 text-center font-bold uppercase focus:ring-2 focus:ring-indigo-500 outline-none" value="E">
                    </div>
                </div>
                <button id="btn-run" onclick="runDijkstra()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-lg transition shadow-md transform active:scale-95">
                    TÌM ĐƯỜNG ĐI NGẮN NHẤT
                </button>
            </section>

            <section id="playback-controls" class="hidden flex-col gap-3 p-4 bg-indigo-50 rounded-xl border border-indigo-100 shadow-inner">
                <div class="flex justify-between items-center">
                    <h2 class="font-bold text-indigo-900 text-sm italic">MÔ PHỎNG TỪNG BƯỚC</h2>
                    <span id="step-counter" class="text-[10px] bg-indigo-200 px-2 py-0.5 rounded-full text-indigo-700 font-bold uppercase">Bước: 0/0</span>
                </div>
                
                <div class="grid grid-cols-3 gap-2">
                    <button onclick="prevStep()" class="bg-white hover:bg-gray-50 text-indigo-600 font-bold py-2 rounded-lg border border-indigo-200 transition text-sm">⬅ Lùi</button>
                    
                    <button id="btn-auto" onclick="toggleAutoPlay()" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2 rounded-lg border border-transparent transition text-sm flex items-center justify-center gap-1">
                        <span id="auto-icon">▶</span> <span id="auto-text">Tự chạy</span>
                    </button>

                    <button onclick="nextStep()" class="bg-white hover:bg-gray-50 text-indigo-600 font-bold py-2 rounded-lg border border-indigo-200 transition text-sm">Tiếp ➡</button>
                </div>

                <div id="status-text" class="text-sm text-indigo-800 leading-relaxed min-h-[60px] bg-white/50 p-2 rounded-md border border-white">
                    Sẵn sàng...
                </div>
                <button onclick="resetGraph()" class="text-xs text-indigo-400 hover:text-indigo-600 underline text-center">Hủy mô phỏng</button>
            </section>
        </div>

        <div class="w-2/3 bg-white rounded-xl panel-shadow relative overflow-hidden" id="canvas-container">
            <canvas id="graph-canvas"></canvas>
            <div class="absolute bottom-4 left-4 flex gap-4 bg-white/80 backdrop-blur-sm p-3 rounded-lg text-xs font-medium border border-gray-200 shadow-sm">
                <div class="flex items-center gap-1"><span class="w-3 h-3 bg-orange-400 rounded-full"></span> Đang xét</div>
                <div class="flex items-center gap-1"><span class="w-3 h-3 bg-blue-500 rounded-full"></span> Đã duyệt</div>
                <div class="flex items-center gap-1"><span class="w-3 h-3 bg-green-500 rounded-full"></span> Kết quả</div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('graph-canvas');
        const ctx = canvas.getContext('2d');
        const container = document.getElementById('canvas-container');

        let nodes = [];
        let edges = [];
        let historyStates = [];
        let currentStep = -1;
        let isDragging = false, draggedNode = null;
        
        // --- CÁC BIẾN CHO AUTO-PLAY ---
        let autoPlayInterval = null;
        const AUTO_PLAY_DELAY = 750; // 0.75 giây

        function resizeCanvas() {
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;
            draw();
        }
        window.addEventListener('resize', resizeCanvas);

        function generateRandomGraph() {
            stopAutoPlay();
            const numNodes = Math.floor(Math.random() * 4) + 5;
            const nodeIds = [];
            for (let i = 0; i < numNodes; i++) nodeIds.push(String.fromCharCode(65 + i));
            const newEdges = [];
            const edgeSet = new Set();
            const addEdge = (u, v) => {
                if (u === v) return;
                const key = [u, v].sort().join('-');
                if (!edgeSet.has(key)) {
                    edgeSet.add(key);
                    const weight = Math.floor(Math.random() * 15) + 1;
                    newEdges.push(`${u} ${v} ${weight}`);
                }
            };
            for (let i = 1; i < numNodes; i++) addEdge(nodeIds[i], nodeIds[Math.floor(Math.random() * i)]);
            for (let i = 0; i < numNodes; i++) addEdge(nodeIds[Math.floor(Math.random() * numNodes)], nodeIds[Math.floor(Math.random() * numNodes)]);
            document.getElementById('edge-input').value = newEdges.join('\n');
            document.getElementById('start-node').value = nodeIds[0];
            document.getElementById('end-node').value = nodeIds[numNodes - 1];
            nodes = []; 
            parseGraph();
        }

        function parseGraph() {
            stopAutoPlay();
            const lines = document.getElementById('edge-input').value.toUpperCase().trim().split('\n');
            const newEdges = [];
            const nodeSet = new Set();
            lines.forEach(line => {
                const [u, v, w] = line.trim().split(/\s+/);
                if (u && v) {
                    newEdges.push({ u, v, weight: parseInt(w) || 1 });
                    nodeSet.add(u); nodeSet.add(v);
                }
            });
            edges = newEdges;
            const nodeArray = Array.from(nodeSet).sort();
            const centerX = canvas.width / 2, centerY = canvas.height / 2;
            const radius = Math.min(centerX, centerY) * 0.7;
            const existingNodes = [...nodes];
            nodes = nodeArray.map((id, i) => {
                const old = existingNodes.find(n => n.id === id);
                if (old) return old;
                const angle = (i / nodeArray.length) * Math.PI * 2;
                return { id, x: centerX + radius * Math.cos(angle), y: centerY + radius * Math.sin(angle) };
            });
            resetGraph();
        }

        function runDijkstra() {
            stopAutoPlay();
            const start = document.getElementById('start-node').value.toUpperCase().trim();
            const end = document.getElementById('end-node').value.toUpperCase().trim();
            if (!nodes.find(n => n.id === start) || !nodes.find(n => n.id === end)) return alert("Đỉnh không hợp lệ!");

            historyStates = [];
            let dist = {}, prev = {}, visited = [], unvisited = new Set(nodes.map(n => n.id));
            nodes.forEach(n => dist[n.id] = Infinity);
            dist[start] = 0;

            const save = (msg, curr = null, activeE = null) => {
                historyStates.push({ message: msg, dist: {...dist}, visited: [...visited], curr, activeE, prev: {...prev} });
            };

            save(`Khởi tạo: Bắt đầu từ ${start}.`, start);
            while (unvisited.size > 0) {
                let u = null;
                unvisited.forEach(id => { if (u === null || dist[id] < dist[u]) u = id; });
                if (u === null || dist[u] === Infinity) break;
                if (u === end) { visited.push(u); save(`Đã tìm thấy đích ${end}!`, u); break; }
                unvisited.delete(u);
                save(`Chọn đỉnh ${u}.`, u);
                edges.forEach(e => {
                    let v = (e.u === u) ? e.v : (e.v === u ? e.u : null);
                    if (v && unvisited.has(v)) {
                        save(`Kiểm tra ${u}→${v}`, u, e);
                        if (dist[u] + e.weight < dist[v]) {
                            dist[v] = dist[u] + e.weight;
                            prev[v] = u;
                            save(`${v} cập nhật khoảng cách: ${dist[v]}`, u, e);
                        }
                    }
                });
                visited.push(u);
            }

            let pathNodes = [], pathEdges = [], temp = end;
            while(temp) { pathNodes.push(temp); if(prev[temp]) pathEdges.push({u: prev[temp], v: temp}); temp = prev[temp]; }
            if(dist[end] !== Infinity) {
                historyStates.push({ ...historyStates[historyStates.length-1], message: `Xong! Đường ngắn nhất từ ${start} tới ${end} là ${dist[end]}`, pathNodes, pathEdges });
            }

            document.getElementById('playback-controls').classList.remove('hidden');
            currentStep = 0;
            updateUI();
        }

        // --- HÀM ĐIỀU KHIỂN AUTO PLAY ---
        function toggleAutoPlay() {
            if (autoPlayInterval) {
                stopAutoPlay();
            } else {
                startAutoPlay();
            }
        }

        function startAutoPlay() {
            if (currentStep >= historyStates.length - 1) currentStep = 0; // Quay lại từ đầu nếu đã hết
            
            document.getElementById('auto-text').innerText = "Dừng lại";
            document.getElementById('auto-icon').innerText = "⏸";
            document.getElementById('btn-auto').classList.add('bg-red-500', 'hover:bg-red-600', 'is-playing');
            document.getElementById('btn-auto').classList.remove('bg-indigo-600', 'hover:bg-indigo-700');

            autoPlayInterval = setInterval(() => {
                if (currentStep < historyStates.length - 1) {
                    nextStep();
                } else {
                    stopAutoPlay(); // Tự dừng khi hết bước
                }
            }, AUTO_PLAY_DELAY);
        }

        function stopAutoPlay() {
            clearInterval(autoPlayInterval);
            autoPlayInterval = null;
            document.getElementById('auto-text').innerText = "Tự chạy";
            document.getElementById('auto-icon').innerText = "▶";
            document.getElementById('btn-auto').classList.remove('bg-red-500', 'hover:bg-red-600', 'is-playing');
            document.getElementById('btn-auto').classList.add('bg-indigo-600', 'hover:bg-indigo-700');
        }

        function updateUI() {
            const state = historyStates[currentStep];
            document.getElementById('status-text').innerHTML = `<b>Bước ${currentStep + 1}:</b> ${state.message}`;
            document.getElementById('step-counter').innerText = `Bước: ${currentStep + 1}/${historyStates.length}`;
            draw();
        }

        function nextStep() { if (currentStep < historyStates.length - 1) { currentStep++; updateUI(); } }
        function prevStep() { stopAutoPlay(); if (currentStep > 0) { currentStep--; updateUI(); } }
        function resetGraph() { stopAutoPlay(); historyStates = []; currentStep = -1; document.getElementById('playback-controls').classList.add('hidden'); draw(); }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const state = (currentStep >= 0) ? historyStates[currentStep] : null;

            edges.forEach(e => {
                const n1 = nodes.find(n => n.id === e.u), n2 = nodes.find(n => n.id === e.v);
                if (!n1 || !n2) return;
                let color = '#e2e8f0', width = 2;
                if (state) {
                    if (state.pathEdges?.some(pe => (pe.u===e.u && pe.v===e.v) || (pe.v===e.u && pe.u===e.v))) { color = '#22c55e'; width = 5; }
                    else if (state.activeE?.u === e.u && state.activeE?.v === e.v || state.activeE?.u === e.v && state.activeE?.v === e.u) { color = '#f97316'; width = 4; }
                }
                ctx.beginPath(); ctx.lineWidth = width; ctx.strokeStyle = color;
                ctx.moveTo(n1.x, n1.y); ctx.lineTo(n2.x, n2.y); ctx.stroke();
                const mx = (n1.x + n2.x)/2, my = (n1.y + n2.y)/2;
                ctx.fillStyle = "white"; ctx.beginPath(); ctx.arc(mx, my, 10, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = "#64748b"; ctx.font = "10px Arial"; ctx.textAlign="center"; ctx.fillText(e.weight, mx, my+4);
            });

            nodes.forEach(n => {
                let color = "white", border = "#cbd5e1", textColor = "#1e293b";
                if (state) {
                    if (state.pathNodes?.includes(n.id)) { color = "#22c55e"; border = "#166534"; textColor = "white"; }
                    else if (state.curr === n.id) { color = "#fb923c"; border = "#c2410c"; textColor = "white"; }
                    else if (state.visited.includes(n.id)) { color = "#3b82f6"; border = "#1d4ed8"; textColor = "white"; }
                }
                ctx.beginPath(); ctx.arc(n.x, n.y, 20, 0, Math.PI*2);
                ctx.fillStyle = color; ctx.fill();
                ctx.strokeStyle = border; ctx.lineWidth = 3; ctx.stroke();
                ctx.fillStyle = textColor; ctx.font = "bold 14px Arial"; ctx.textAlign="center"; ctx.fillText(n.id, n.x, n.y + 5);
                if (state && state.dist[n.id] !== Infinity) {
                    ctx.fillStyle = "#ef4444"; ctx.font = "11px Arial"; ctx.fillText("d=" + state.dist[n.id], n.x, n.y - 28);
                }
            });
        }

        canvas.onmousedown = (e) => {
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left, y = e.clientY - rect.top;
            draggedNode = nodes.find(n => Math.hypot(n.x - x, n.y - y) < 20);
            if (draggedNode) isDragging = true;
        };
        window.onmousemove = (e) => {
            if (isDragging) {
                const rect = canvas.getBoundingClientRect();
                draggedNode.x = e.clientX - rect.left; draggedNode.y = e.clientY - rect.top;
                draw();
            }
        };
        window.onmouseup = () => { isDragging = false; };

        setTimeout(() => { resizeCanvas(); parseGraph(); }, 100);
    </script>
</body>
</html>
